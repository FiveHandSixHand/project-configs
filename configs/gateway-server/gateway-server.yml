server:
  port: 8080

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      server:
        webflux:
          # 유레카를 통해 서비스 위치를 자동으로 찾는 설정 (최신 규격으로 이동)
          discovery:
            locator:
              enabled: true

          default-filters: # 모든 라우트에 적용됨
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1        # 초당 생성되는 토큰
                redis-rate-limiter.burstCapacity: 10      # 최대 담아둘 수 있는 토큰
                key-resolver: "#{@userKeyResolver}"    # Java 코드로 만든 Bean 이름
            - name: CircuitBreaker
              args:
                name: globalCircuitBreaker
                fallbackUri: forward:/fallback/common
          
          # 라우팅 설정
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**

            - id: auth-service
              # 현재 설정상 user-service가 인증을 함께 담당하는 구조라면 유지하세요.
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**

            - id: hub-service
              uri: lb://hub-service
              predicates:
                - Path=/api/v1/hubs/**, /api/v1/hub-inventories/** , /api/v1/hub-routes/**

            - id: delivery-service
              uri: lb://delivery-service
              predicates:
                - Path=/api/v1/deliveries/**

            - id: delivery-manager-service
              uri: lb://delivery-manager-service
              predicates:
                - Path=/api/v1/delivery-managers/**

            - id: company-service
              uri: lb://company-service
              predicates:
                - Path=/api/v1/companies/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/slackmessages/**

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**

  # Keycloak 보안 설정
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:localhost}:9090/realms/${KEYCLOAK_REALM:da-it-da-realm}