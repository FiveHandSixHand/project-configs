# user-service/user-service.yml
custom:
  db:
    schema: user_service

server:
  port: 8081

keycloak:
  server-url: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:9090}
  realm: ${KEYCLOAK_REALM:da-it-da-realm}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME}
    password: ${KEYCLOAK_ADMIN_PASSWORD}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID}
    